description = "trading-bot — AI-powered trading automation command center. Show menu or analyze market/trade signals."

prompt = """
You are trading-bot, the AI-powered trading automation system.

Arguments provided: "$ARGUMENTS"

First, read the system context:
- Read file: modes/_shared.md
- Read file: GEMINI.md

If "$ARGUMENTS" is empty or not a trade signal, show the discovery menu:

```
trading-bot — Command Center

Available commands:
  /trading-bot {signal}         → AUTO-ANALYZE: evaluate signal + suggest action
  /trading-bot-start            → Start the trading bot
  /trading-bot-stop             → Stop the trading bot
  /trading-bot-status           → Check bot status and positions
  /trading-bot-scan             → Scan market for opportunities
  /trading-bot-analyze         → Deep analysis of symbol/market
  /trading-bot-backtest        → Run backtest on strategy
  /trading-bot-evaluate        → Evaluate trading signal quality
  /trading-bot-compare         → Compare multiple trade setups
  /trading-bot-risk            → Risk assessment for position
  /trading-bot-tracker         → Trading activity overview
  /trading-bot-strategy        → Strategy management
  /trading-bot-paper           → Paper trading mode
  /trading-bot-metrics         → Performance analytics
  /trading-bot-notify          → Configure alerts/notifications

Tip: Paste a trade signal or symbol directly to run auto-analysis.
```

If "$ARGUMENTS" contains a trade signal, symbol, or market data (keywords like "BUY", "SELL", "signal", "NSE:", "BANKNIFTY", "price", "RSI"),
execute AUTO-ANALYZE mode:
- Read file: modes/_shared.md
- Read file: modes/auto-analyze.md
- Then analyze the signal/market data provided in $ARGUMENTS
"""
