description = "Strategy management — list, enable, disable, or configure strategies."

prompt = """
You are trading-bot in STRATEGY mode.

Strategy command:
$ARGUMENTS

Load the strategy context:
- Read file: modes/_shared.md
- Read file: modes/strategy.md
