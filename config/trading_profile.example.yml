# =============================================================================
# TradingBot – Trading Profile Template
#
# USAGE:
#   cp config/trading_profile.example.yml config/trading_profile.yml
#   # Edit trading_profile.yml with your real values.
#   # trading_profile.yml is in .gitignore and will NOT be committed.
#
# SECURITY:
#   Never put real API keys here. Use environment variables or
#   fill them in only in your LOCAL trading_profile.yml copy.
# =============================================================================

# ---------------------------------------------------------------------------
# Trader identity (used in logs and reports)
# ---------------------------------------------------------------------------
trader:
  name: "Your Name"
  email: "your@email.com"
  timezone: "Asia/Kolkata"

  notifications:
    email_enabled: false
    telegram_enabled: false
    telegram_bot_token: ""    # Set via TELEGRAM_BOT_TOKEN env var
    telegram_chat_id: ""      # Set via TELEGRAM_CHAT_ID env var

# ---------------------------------------------------------------------------
# Risk profile – conservative defaults; adjust carefully
# ---------------------------------------------------------------------------
risk_profile:
  risk_per_trade: 0.01          # 1 % of capital (start conservatively)
  max_positions: 5
  max_position_value: 20000
  min_position_value: 5000
  max_daily_loss: 0.03          # Stop trading at 3 % daily loss
  max_trades_per_day: 10
  default_stop_loss_pct: 1.5
  default_take_profit_pct: 4.5
  min_risk_reward_ratio: 2.0
  max_drawdown_pct: 10.0

# ---------------------------------------------------------------------------
# Trading preferences
# ---------------------------------------------------------------------------
trading_preferences:
  default_symbols:
    - "NSE:NIFTY50-INDEX"
    - "NSE:NIFTYBANK-INDEX"
    - "NSE:RELIANCE-EQ"
    - "NSE:TCS-EQ"
    - "NSE:HDFCBANK-EQ"
    - "NSE:ICICIBANK-EQ"

  market_session:
    pre_market_start: "09:00"
    market_open: "09:15"
    market_close: "15:30"
    post_market_end: "16:00"

  trading_mode: "MIS"
  order_type: "MARKET"

  auto_trading:
    enabled: false              # KEEP FALSE until you have weeks of paper data
    confirmation_required: true
    min_signal_score: 75.0
    paper_trading: true         # Always start with paper trading

  scanning:
    interval_seconds: 60
    use_live_data: true
    historical_lookback: 50

# ---------------------------------------------------------------------------
# Strategy settings
# ---------------------------------------------------------------------------
strategies:
  enabled:
    - "smart_money"
    - "order_block"

  timeframe:
    main: "1h"        # Higher-timeframe trend confirmation
    entry: "5m"       # Lower-timeframe entry signal
    higher: "4h"      # Broader market context

  smart_money:
    min_pattern_size: 3
    confidence_threshold: 0.60
    require_fvg: false
    require_mss: false

  order_block:
    lookback_periods: 20
    volume_threshold: 1.5

  fvg_detector:
    enabled: false
    min_gap_size: 0.5
    fill_threshold: 0.3

# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------
alerts:
  on_signal_generated: true
  on_trade_executed: true
  on_stop_loss_hit: true
  on_take_profit_hit: true
  on_daily_limit_reached: true
  on_error: true
  quiet_hours:
    start: "22:00"
    end: "08:00"

# ---------------------------------------------------------------------------
# Reporting
# ---------------------------------------------------------------------------
reporting:
  daily_report: true
  weekly_report: true
  export_formats:
    - "csv"
  save_to_disk: true

# ---------------------------------------------------------------------------
# API credentials
# IMPORTANT: Fill these in your LOCAL copy only.
# Better practice: set FYERS_CLIENT_ID and FYERS_SECRET_KEY as env vars.
# ---------------------------------------------------------------------------
api:
  fyers:
    client_id: "${FYERS_CLIENT_ID}"       # Export FYERS_CLIENT_ID=... in shell
    secret_key: "${FYERS_SECRET_KEY}"     # Export FYERS_SECRET_KEY=... in shell
    redirect_uri: "http://127.0.0.1:5000/fyers/callback"
    log_level: "INFO"

  rate_limits:
    quotes: 10
    orders: 5
    historical: 2

# ---------------------------------------------------------------------------
# AI – Google Gemini (optional)
# ---------------------------------------------------------------------------
ai:
  gemini:
    enabled: false
    api_key: "${GEMINI_API_KEY}"
    model: "gemini-1.5-flash"
    features:
      explain_signals: true
      validate_signals: true
      suggest_position_size: true
      analyze_trades: true
    thresholds:
      min_confidence: 0.70
      max_vix_for_trading: 25

# ---------------------------------------------------------------------------
# Advanced / operational settings
# ---------------------------------------------------------------------------
advanced:
  log_level: "INFO"
  log_retention_days: 30
  structured_logging: true

  retry:
    max_attempts: 3
    backoff_factor: 2.0
    max_delay_seconds: 60

  circuit_breaker:
    failure_threshold: 5
    recovery_timeout: 300
    half_open_max_calls: 3

  performance:
    max_workers: 4
    queue_size: 100
    cache_ttl_seconds: 60
