trader:
  name: Trader
  email: trader@example.com
  timezone: Asia/Kolkata
  notifications:
    email_enabled: false
    telegram_enabled: false
    telegram_bot_token: ''
    telegram_chat_id: ''
risk_profile:
  risk_per_trade: 0.02
  max_positions: 5
  max_position_value: 20000
  min_position_value: 5000
  max_daily_loss: 0.05
  max_trades_per_day: 10
  default_stop_loss_pct: 2.0
  default_take_profit_pct: 3.0
  min_risk_reward_ratio: 2.0
  max_drawdown_pct: 10.0
trading_preferences:
  default_symbols:
  - NSE:NIFTY50-INDEX
  - NSE:NIFTYBANK-INDEX
  market_session:
    pre_market_start: 09:00
    market_open: 09:15
    market_close: '15:30'
    post_market_end: '16:00'
  trading_mode: MIS
  order_type: MARKET
  auto_trading:
    enabled: false
    confirmation_required: true
    min_signal_score: 75.0
    paper_trading: true
  scanning:
    interval_seconds: 60
    use_live_data: true
    historical_lookback: 50
strategies:
  enabled:
  - smart_money
  - order_block
  timeframe:
    main: 1h
    entry: 5m
    higher: 4h
  smart_money:
    min_pattern_size: 3
    confidence_threshold: 0.75
    require_fvg: false
    require_mss: false
  order_block:
    lookback_periods: 20
    volume_threshold: 1.5
  fvg_detector:
    enabled: false
    min_gap_size: 0.5
    fill_threshold: 0.3
alerts:
  on_signal_generated: true
  on_trade_executed: true
  on_stop_loss_hit: true
  on_take_profit_hit: true
  on_daily_limit_reached: true
  on_error: true
  quiet_hours:
    start: '22:00'
    end: 08:00
reporting:
  daily_report: true
  weekly_report: true
  export_formats:
  - csv
  save_to_disk: true
api:
  fyers:
    client_id: ID52MLOEQQ-100
    secret_key: Z5AI98KTZZ
    redirect_uri: http://127.0.0.1:5000/fyers/callback
    log_level: INFO
  rate_limits:
    quotes: 10
    orders: 5
    historical: 2
fyers_app:
  username: XA72156
  pin: '2424'
  mobile: '9550414039'
ai:
  gemini:
    enabled: false
    api_key: ${GEMINI_API_KEY}
    model: gemini-1.5-flash
    features:
      explain_signals: true
      validate_signals: true
      suggest_position_size: true
      analyze_trades: true
    thresholds:
      min_confidence: 0.7
      max_vix_for_trading: 25
advanced:
  log_level: INFO
  log_retention_days: 30
  structured_logging: true
  retry:
    max_attempts: 3
    backoff_factor: 2.0
    max_delay_seconds: 60
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout: 300
    half_open_max_calls: 3
  performance:
    max_workers: 4
    queue_size: 100
    cache_ttl_seconds: 60
